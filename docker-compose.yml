    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  data-science-service:
    build:
      context: ./backend
      dockerfile: services/data-science-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SERVICE_NAME: data-science-service
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PYTHONPATH: /app:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  excel-engine-service:
    build:
      context: ./backend
      dockerfile: services/excel-engine-service/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: excel-engine-service
      PYTHONPATH: /app
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────── API Gateway ───────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      GATEWAY_PORT: 8000
      AUTH_SERVICE_URL: http://auth-service:8001
      ACCOUNTING_SERVICE_URL: http://accounting-service:8002
      RISK_SERVICE_URL: http://risk-service:8003
      ACTUARIAL_SERVICE_URL: http://actuarial-service:8004
      AI_SERVICE_URL: http://ai-service:8006
      COMPLIANCE_SERVICE_URL: http://compliance-service:8007
      WORKSPACE_SERVICE_URL: http://workspace-service:8008
      DATA_SCIENCE_SERVICE_URL: http://data-science-service:8009
      EXCEL_ENGINE_SERVICE_URL: http://excel-engine-service:8010
      GATEWAY_RATE_LIMIT: 120
      GATEWAY_RATE_WINDOW: 60
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      - auth-service
      - accounting-service
      - risk-service
      - actuarial-service
      - ai-service
      - compliance-service
      - workspace-service
      - data-science-service
      - excel-engine-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────── Frontend ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      - api-gateway
    ports:
      - "5173:5173"

volumes:
  postgres_data:
